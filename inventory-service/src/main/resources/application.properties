# 1. Port settings
server.port=8082

# 2. Database Connection (Corrected for Docker)
spring.datasource.url=jdbc:mysql://mysqldb-3307:3306/inventory_db
spring.datasource.username=root
spring.datasource.password=root123

# 3. Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.show-sql=true

# 4. Kafka Settings (Updated to host.docker.internal)
spring.kafka.bootstrap-servers=host.docker.internal:9092
spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.auto-offset-reset=earliest

# 5. Deserialization Settings
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.fastorder.dto

# 6. Redis Settings (Updated to host.docker.internal)
spring.data.redis.host=host.docker.internal
spring.data.redis.port=6379
spring.cache.redis.time-to-live=600000
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect