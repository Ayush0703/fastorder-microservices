# 1. Give it a unique port
server.port=8082

# 2. Connect to the NEW database
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_db
spring.datasource.username=root
spring.datasource.password=root123

# 3. Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.show-sql=true

# 4. Kafka Settings (The Ear)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.auto-offset-reset=earliest

# 5. How to turn Bytes back into Java (Deserialization)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.fastorder.dto

spring.data.redis.host=localhost
spring.data.redis.port=6379
# Set a default expiration (TTL) for your cache (e.g., 10 minutes)
spring.cache.redis.time-to-live=600000